<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal ARCA - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      background: white;
    }

    .foto {
      width: 45%;
      height: 100vh;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/1200px-Cat03.jpg') center/cover;
    }

    .form-area {
      width: 55%;
      height: 100vh;
      padding: 60px 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 30px;
    }

    label {
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .row-senha {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .row-senha a {
      font-size: 12px;
      color: #2e7d32;
      text-decoration: none;
    }

    .lembrar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
      margin-bottom: 20px;
    }

    .btn-entrar {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .ou {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .cadastro {
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .cadastro a {
      color: #2e7d32;
      text-decoration: none;
      font-weight: bold;
    }













    .msg-erro {
      display: none;
      background: #ffebee;
      border: 1px solid #ef9a9a;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c62828;
      margin-bottom: 14px;
    }
    .msg-erro.visivel { display: block; }
    input.campo-invalido { border-color: #c62828; }
  </style>
</head>
<body>

  <div class="foto"></div>

  <div class="form-area">

    <div class="logo">🐾 ARCA | Portal ARCA</div>
    <div class="subtitle">Bem-vindo de volta! Por favor, insira seus dados.</div>

    <div class="msg-erro" id="msg-erro"></div>

    <label>E-mail</label>
    <input type="email" id="campo-usuario" placeholder="exemplo@email.com">

    <div class="row-senha">
      <label>Senha</label>
      <a href="#">Esqueceu a senha?</a>
    </div>
    <input type="password" id="campo-senha" placeholder="••••••••">

    <label class="lembrar">
      <input type="checkbox" style="width:auto; margin:0;"> Lembrar de mim
    </label>

    <button class="btn-entrar" onclick="validarLogin()">Entrar no Portal</button>

    <div class="ou">ou continue com</div>

    <button class="btn-google">🔍 Google</button>

    <div class="cadastro">
Não tem uma conta? <a href="/cadastro-tutor.html">Cadastre-se</a>

    </div>

  </div>

  <script>
    const USUARIOS = {
      tutor: '123456'
    };

    function validarLogin() {
      const usuario = document.getElementById('campo-usuario').value.trim().toLowerCase();
      const senha   = document.getElementById('campo-senha').value;
      const msgErro = document.getElementById('msg-erro');
      const inputU  = document.getElementById('campo-usuario');
      const inputS  = document.getElementById('campo-senha');













      msgErro.classList.remove('visivel');
      inputU.classList.remove('campo-invalido');
      inputS.classList.remove('campo-invalido');













      if (!usuario || !senha) {
        msgErro.textContent = '⚠️ Preencha o e-mail e a senha.';
        msgErro.classList.add('visivel');
        if (!usuario) inputU.classList.add('campo-invalido');
        if (!senha)   inputS.classList.add('campo-invalido');
        return;
      }













      if (!USUARIOS[usuario] || USUARIOS[usuario] !== senha) {
        msgErro.textContent = '⚠️ Usuário ou senha incorretos.';
        msgErro.classList.add('visivel');
        inputU.classList.add('campo-invalido');
        inputS.classList.add('campo-invalido');
        inputS.value = '';
        return;
      }













      window.location.href = 'index.html';
    }

    document.getElementById('campo-senha')
      .addEventListener('keydown', function(e) {
        if (e.key === 'Enter') validarLogin();
      });
  </script>

</body>
</html>
