<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal ARCA - Cadastrar Animal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; display: flex; min-height: 100vh; background: #f5f5f5; }

    






    .sidebar {
      width: 180px; background: #2d5a35; min-height: 100vh;
      display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
    }
    .sidebar-logo {
      color: white; font-size: 13px; font-weight: bold;
      padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px;
    }
    .sidebar-logo .escudo { font-size: 22px; display: block; margin-bottom: 4px; }
    .sidebar ul { list-style: none; }
    .sidebar ul li a {
      display: block; padding: 11px 20px;
      color: #a5d6a7; text-decoration: none; font-size: 13px; letter-spacing: 0.5px;
    }
    .sidebar ul li.ativo a { color: white; font-weight: bold; background: rgba(255,255,255,0.1); }









    .content { flex: 1; padding: 40px 50px; }
    .content h1 { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
    .content .sub { font-size: 12px; color: #888; margin-bottom: 28px; }

   







    .grid { display: flex; gap: 20px; }
    .col-esq { flex: 1; }
    .col-dir { flex: 1.3; }

   






    .campo { margin-bottom: 14px; }
    label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    label span { color: #e07b2e; }

    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; font-family: Arial; background: white;
    }
    textarea { height: 70px; resize: none; }

    







    .foto-box {
      border: 1px solid #ddd; border-radius: 8px;
      background: white; padding: 30px;
      text-align: center; color: #aaa; font-size: 12px;
      margin-bottom: 14px; cursor: pointer;
    }
    .foto-box .ic { font-size: 26px; display: block; margin-bottom: 8px; }
    .foto-box small { font-size: 10px; display: block; margin-top: 4px; }








    .btn-group { display: flex; gap: 8px; margin-top: 4px; }
    .btn-sel {
      padding: 7px 16px; border-radius: 6px; font-size: 12px; cursor: pointer;
      border: 1px solid #ddd; background: white; color: #555;
    }
    .btn-sel.ativo { background: #3a7d44; color: white; border-color: #3a7d44; }

  







    .sexo-group { display: flex; gap: 8px; margin-top: 4px; }
    .sexo-btn {
      padding: 7px 20px; border-radius: 6px; font-size: 12px; cursor: pointer;
      border: 1px solid #ddd; background: white; color: #555;
    }
    .sexo-btn.ativo { background: #1a1a1a; color: white; border-color: #1a1a1a; }

   





    .linha { display: flex; gap: 12px; }
    .linha .campo { flex: 1; }

    






    .mapa-box {
      border: 1px solid #ddd; border-radius: 8px;
      background: #e8e8e8; height: 120px; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #e07b2e;
    }

   




    .radio-group { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
    .radio-group label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #333; margin: 0; cursor: pointer;
    }

   





    .footer-btns {
      display: flex; justify-content: flex-end; gap: 12px;
      margin-top: 30px;
    }
    .btn-cancelar {
      background: #e07b2e; color: white; border: none;
      padding: 10px 24px; border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .btn-salvar {
      background: #2d5a35; color: white; border: none;
      padding: 10px 24px; border-radius: 6px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }

    .obter-atual {
      font-size: 11px; color: #3a7d44; cursor: pointer;
      display: flex; align-items: center; gap: 4px; float: right;
    }
  </style>
</head>
<body>

  






  <div class="sidebar">
    <div class="sidebar-logo">
      <span class="escudo">🛡️</span>
      SERRA
    </div>
    <ul>
      <li><a href="#">MINHA CONTA</a></li>
      <li><a href="#">CAMPANHAS</a></li>
      <li class="ativo"><a href="#">ANIMAIS</a></li>
      <li><a href="#">DOAÇÕES</a></li>
      <li><a href="#">ADOÇÕES</a></li>
      <li><a href="#">NOTIFICAÇÕES</a></li>
      <li><a href="#">ACESSOS</a></li>
      <li><a href="#">SESSÕES</a></li>
      <li><a href="#">PARCEIROS</a></li>
      <li><a href="/servicos/index/index (2).html">HOME</a></li>
    </ul>
  </div>








  <div class="content">
    <h1>Cadastrar Animal</h1>
    <p class="sub">Preencha os dados do animal resgatado para registrá-lo no sistema.</p>

    <div class="grid">

     





      <div class="col-esq">

        <div class="campo">
          <label>Foto Principal</label>
          <div class="foto-box">
            <span class="ic">📷</span>
            Clique para inserir a imagem
            <small>PNG, JPG até 5MB</small>
          </div>
        </div>

        <div class="campo">
          <label>Espécie</label>
          <select><option>Cachorro...</option><option>Gato</option><option>Outro</option></select>
        </div>

        <div class="campo">
          <label>Raça</label>
          <input type="text" placeholder="Digite para buscar ou SRD...">
        </div>

        <div class="campo">
          <label>Porte</label>
          <div class="btn-group">
            <button class="btn-sel">Pequeno (P)</button>
            <button class="btn-sel ativo">Médio (M)</button>
            <button class="btn-sel">Grande (G)</button>
          </div>
        </div>

        <div class="linha">
          <div class="campo">
            <label>Sexo</label>
            <div class="sexo-group">
              <button class="sexo-btn ativo">Macho</button>
              <button class="sexo-btn">Fêmea</button>
            </div>
          </div>
          <div class="campo">
            <label>Idade Estimada</label>
            <select><option>Anos...</option><option>Filhote</option><option>Adulto</option><option>Idoso</option></select>
          </div>
        </div>

      </div>

   







    
      <div class="col-dir">

        <div class="campo">
          <label>Nome do Animal <span>*</span></label>
          <input type="text" placeholder="Nome provisório ou popular">
        </div>

        <div class="campo">
          <label>
            Local de Resgate
            <span class="obter-atual">📍 Obter atual</span>
          </label>
          <input type="text" placeholder="Busca aproximada..." style="margin-bottom:8px;">
          <div class="mapa-box">📍</div>
        </div>

        <div class="campo">
          <label>Estado de Saúde (Avaliação Inicial)</label>
          <input type="text" placeholder="">
        </div>

        <div class="campo">
          <label>Voluntário Responsável pelo Resgate</label>
          <input type="text" placeholder="Buscar por nome ou CPF...">
        </div>

        <div class="campo">
          <label>Observações Gerais</label>
          <textarea placeholder="Detalhes sobre o comportamento, circunstâncias, etc..."></textarea>
        </div>

        <div class="campo">
          <label>Status Histórico Clínico</label>
          <div class="radio-group">
            <label><input type="radio" name="status" checked> Quarentena / Tratamento</label>
            <label><input type="radio" name="status"> Disponível para adoção imediata</label>
          </div>
        </div>

      </div>
    </div>

   





    
    <div class="footer-btns">
      <button class="btn-cancelar">Cancelar</button>
      <button class="btn-salvar">💾 Salvar Animal</button>
    </div>

  </div>

</body>
</html>
